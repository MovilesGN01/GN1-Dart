name: uniride
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Navigation ──────────────────────────────────────────
  google_fonts: ^6.1.0           # Poppins font
  go_router: ^13.0.0             # Declarative routing
  cupertino_icons: ^1.0.8

  # ── State management ─────────────────────────────────────────
  provider: ^6.1.1               # ChangeNotifier + MultiProvider

  # ── Firebase ─────────────────────────────────────────────────
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0          # Auth: signIn, createUser
  cloud_firestore: ^5.2.0        # Direct Firestore reads
  cloud_functions: ^5.0.0        # Callable functions: createRide,
    # requestRide, acceptRide,
    # rejectRide, finishRide,
    # createUserDocument, verifyNFC,
  # registerNFC, chatbot

  # ── Networking ───────────────────────────────────────────────
  http: ^1.2.0                   # Open-Meteo weather API

  # ── Local storage (Sprint 3) ─────────────────────────────────
  sqflite: ^2.3.3+1              # SQLite: rides table +
  # pending_operations table
  path_provider: ^2.1.4          # Required by sqflite (app dir)
  path: ^1.9.0                   # Required by sqflite (join paths)
  shared_preferences: ^2.3.2     # session_user_id, last_weather,
  # last sync timestamp

  # ── Connectivity (Sprint 3) ──────────────────────────────────
  connectivity_plus: ^6.0.5      # Stream<bool> online/offline
    # detection for OfflineBanner
  # and SyncManager

  # ── Caching (Sprint 3) ───────────────────────────────────────
  cached_network_image: ^3.4.1   # Driver/user profile image cache
  # (5 pts rúbrica caching)

  # ── Device sensors ───────────────────────────────────────────
  geolocator: ^13.0.0            # GPS: origin auto-fill,
  # zone detection
  nfc_manager: ^3.5.0            # NFC tag read (main branch)

  # ── Utilities ────────────────────────────────────────────────
  intl: ^0.19.0                  # Date formatting: departure time,
  # updatedAt in analytics views
  uuid: ^4.5.1                   # Local UUID for pending_operations
  # rows (offline create/reserve)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true